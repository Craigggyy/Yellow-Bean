<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Yellow Bean Café — Welcome</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body, html { height: 100%; overflow: hidden; }
    .splash-page { height: 100vh; }
    .floating-bean {
      position: absolute;
      width: 18px; height: 18px;
      background: rgba(75,46,19,.12);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }
    .splash-enter-line {
      width: 60px; height: 3px;
      background: var(--brown);
      opacity: .3;
      margin: 0 auto 28px;
      animation: fadeUp .7s .6s both;
    }
    .est-badge {
      background: rgba(75,46,19,.1);
      border: 1.5px solid rgba(75,46,19,.2);
      border-radius: 30px;
      padding: 5px 18px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--brown);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: inline-block;
      margin-bottom: 20px;
      animation: fadeUp .7s .05s both;
    }
  </style>
</head>
<body>
  <!-- Floating beans -->
  <div class="splash-page">
    <div class="floating-bean" style="left:10%;animation-duration:8s;animation-delay:0s;width:24px;height:24px;"></div>
    <div class="floating-bean" style="left:25%;animation-duration:11s;animation-delay:2s;"></div>
    <div class="floating-bean" style="left:50%;animation-duration:9s;animation-delay:4s;width:30px;height:30px;"></div>
    <div class="floating-bean" style="left:70%;animation-duration:13s;animation-delay:1s;width:14px;height:14px;"></div>
    <div class="floating-bean" style="left:85%;animation-duration:10s;animation-delay:3s;width:20px;height:20px;"></div>
    <div class="floating-bean" style="left:40%;animation-duration:12s;animation-delay:5s;"></div>

    <div class="splash-logo">☕</div>
    <span class="est-badge">Est. October 2023 · Taal, Batangas</span>
    <h1 class="splash-title">Yellow<br><span style="color:#4B2E13;">Bean</span></h1>
    <p class="splash-tagline">Where every sip is a ray of sunshine!</p>
    <div class="splash-enter-line"></div>
    <a href="home.html" class="btn-yb splash-btn" style="font-size:1rem;padding:14px 42px;">
      Enter the Café &nbsp;<i class="bi bi-arrow-right"></i>
    </a>
    <p style="margin-top:20px;font-size:0.78rem;color:rgba(75,46,19,.5);animation:fadeUp .7s .7s both;">
      Dine In &nbsp;·&nbsp; Takeout &nbsp;·&nbsp; Delivery &nbsp;·&nbsp; Events
    </p>

    <!-- Wave -->
    <svg class="splash-wave" viewBox="0 0 1440 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,40 C360,80 1080,0 1440,40 L1440,80 L0,80 Z" fill="rgba(75,46,19,0.08)"/>
    </svg>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>

  </script>
</body>
</html>
